<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/tabs/home"></ion-back-button>
    </ion-buttons>
    <ion-title>{{ isEditMode ? 'Edit' : 'Tambah' }} Obat</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <form [formGroup]="medicationForm" (ngSubmit)="save()">

    <ion-list>
      <ion-item>
        <ion-input label="Nama Obat *" labelPlacement="floating" formControlName="name"
          placeholder="Contoh: Paracetamol"></ion-input>
      </ion-item>

      <ion-item>
        <ion-input label="Dosis (Opsional)" labelPlacement="floating" formControlName="dosage"
          placeholder="Contoh: 1 tablet / 5 ml"></ion-input>
      </ion-item>

      <ion-item>
        <ion-label>Tanggal Mulai</ion-label>
        <ion-datetime-button datetime="datetime-start"></ion-datetime-button>
        <ion-modal [keepContentsMounted]="true">
          <ng-template>
            <ion-datetime id="datetime-start" formControlName="startDate" presentation="date"></ion-datetime>
          </ng-template>
        </ion-modal>
      </ion-item>

      <ion-item>
        <ion-label>Tanggal Selesai</ion-label>
        <ion-datetime-button datetime="datetime-end"></ion-datetime-button>
        <ion-modal [keepContentsMounted]="true">
          <ng-template>
            <ion-datetime id="datetime-end" formControlName="endDate" presentation="date"></ion-datetime>
          </ng-template>
        </ion-modal>
      </ion-item>

      <ion-item-divider color="light">
        <ion-label>Waktu Minum Obat</ion-label>
        <ion-button slot="end" fill="clear" (click)="addTime()">
          <ion-icon slot="icon-only" name="add-circle"></ion-icon>
        </ion-button>
      </ion-item-divider>

      <ion-list formArrayName="times">
        <ion-item *ngFor="let t of times.controls; let i = index">
          <ion-label>Waktu {{i + 1}}</ion-label>
          <ion-datetime-button [datetime]="'datetime-time-'+i"></ion-datetime-button>
          <ion-modal [keepContentsMounted]="true">
            <ng-template>
              <ion-datetime [id]="'datetime-time-'+i" [formControlName]="i" presentation="time"></ion-datetime>
            </ng-template>
          </ion-modal>
          <ion-button slot="end" color="danger" fill="clear" (click)="removeTime(i)" *ngIf="times.length > 1">
            <ion-icon slot="icon-only" name="trash"></ion-icon>
          </ion-button>
        </ion-item>
      </ion-list>

    </ion-list>

    <div class="ion-padding-top">
      <ion-button expand="block" shape="round" type="submit" [disabled]="!medicationForm.valid">Simpan
        Jadwal</ion-button>
    </div>
  </form>
</ion-content>
